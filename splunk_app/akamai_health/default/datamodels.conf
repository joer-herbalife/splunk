[akamai_health]
# Splunk Cloud vetting prohibits shipping an ACCELERATED data model in an app
# (check_for_datamodel_acceleration). The app therefore ships un-accelerated, and
# an admin MUST enable acceleration in Splunk Web after install — otherwise the
# dashboard's tstats searches fall back to slow raw scans.
#
# Enable it here after install:
#   Settings > Data models > Akamai Health > Edit > Acceleration
#     - Accelerate: on
#     - Summary Range: 7 Days   (must be >= the dashboard's widest time picker)
# See README.md ("Enable acceleration") for the exact steps and constraints.
acceleration = false
